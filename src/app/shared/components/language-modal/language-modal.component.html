<ion-header>
  <ion-toolbar>
    <ion-title>{{ translate('common.language') }}</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="dismiss()">
        <ion-icon name="close-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-list>
    <ion-item 
      *ngFor="let lang of supportedLanguages" 
      button 
      (click)="selectLanguage(lang.code)"
      [class.selected]="currentLanguage === lang.code">
      <ion-label>
        <h2>{{ lang.flag }} {{ lang.name }}</h2>
        <p>{{ lang.nativeName }}</p>
      </ion-label>
      <ion-icon 
        *ngIf="currentLanguage === lang.code" 
        name="checkmark-circle-outline" 
        slot="end"
        color="primary">
      </ion-icon>
    </ion-item>
  </ion-list>
</ion-content>
